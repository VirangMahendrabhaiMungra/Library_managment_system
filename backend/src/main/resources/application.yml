spring:
  application:
    name: library-management-system
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/smart_library?useSSL=false&serverTimezone=UTC}
    # Default credentials are for local development only. Override via environment variables in production.
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

jwt:
  # IMPORTANT: Set the JWT_SECRET environment variable in production. The default is for local development only.
  secret: ${JWT_SECRET:CHANGE_ME_generate_a_secure_base64_encoded_256bit_key}
  expiration: 86400000 # 1 day

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: slms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: smart_library
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: slms-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/smart_library?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_generate_a_secure_base64_encoded_256bit_key}
    ports:
      - "8080:8080"

  frontend:
    image: nginx:alpine
    container_name: slms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/conf.d/default.conf
    # The frontend static files are built and served via nginx.
    # In production, copy the built frontend-dist from the backend container
    # or run a separate frontend build step.

volumes:
  mysql_data:
